---
- name: Install WireGuard and dependencies
  apt:
    name:
      - wireguard
      - wireguard-tools
      - iptables
      - resolvconf
    state: present
    update_cache: yes
  become: yes

- name: Ensure /etc/wireguard exists
  file:
    path: /etc/wireguard
    state: directory
    mode: "0755"
  become: yes

- name: Generate WireGuard keypair if missing
  command: bash -lc "umask 077 && wg genkey | tee /etc/wireguard/private.key | wg pubkey > /etc/wireguard/public.key"
  args:
    creates: /etc/wireguard/private.key
  become: yes

- name: Read private key
  slurp:
    src: /etc/wireguard/private.key
  register: wg_priv
  become: yes

- name: Read public key
  slurp:
    src: /etc/wireguard/public.key
  register: wg_pub
  become: yes

- name: Set local WireGuard facts
  set_fact:
    private_key: "{{ wg_priv.content | b64decode | trim }}"
    public_key: "{{ wg_pub.content | b64decode | trim }}"
    cacheable: true

- name: Normalize WireGuard variables
  set_fact:
    address: "{{ address | default(ansible_host) }}"
    public_interface: "{{ public_interface | default((ansible_default_ipv4 | default({})).get('interface', 'eth0')) }}"
    hub_info: "{{ hub_info | default({'name': 'n4000', 'public_key': 'SIb8eIm+y9dUq5erNdBQgKYbce084KsFa/nnUiGn4j0=', 'endpoint': 'yeopeter1031.mooo.com:11052'}) }}"
    all_peers: "{{ all_peers | default([]) }}"

- name: Check current MTU on n4200 wlp1s0
  command: ip -o link show wlp1s0
  register: n4200_wlp1s0_link
  changed_when: false
  failed_when: false
  when: inventory_hostname == 'n4200'
  become: yes

# wlp1s0 과 wg0 사이에서 발생하는 병목으로 인한 mtu조정
- name: Set MTU 1400 on n4200 wlp1s0
  shell: |
    if command -v ifconfig >/dev/null 2>&1; then
      ifconfig wlp1s0 mtu 1400
    else
      ip link set dev wlp1s0 mtu 1400
    fi
  args:
    executable: /bin/bash
  when:
    - inventory_hostname == 'n4200'
    - "'mtu 1400' not in (n4200_wlp1s0_link.stdout | default(''))"
  become: yes


- name: Generate WireGuard configuration from template
  template:
    src: "{{ playbook_dir }}/roles/common/templates/wg0.conf.j2"
    dest: /etc/wireguard/wg0.conf
    owner: root
    group: root
    mode: "0600"
  register: wg_conf
  become: yes

- name: Detect wg0 interface
  command: ip link show wg0
  register: wg0_link
  changed_when: false
  failed_when: false
  become: yes

- name: Start wg-quick@wg0 when interface is absent
  systemd:
    name: wg-quick@wg0
    state: started
    enabled: yes
  when: wg0_link.rc != 0
  become: yes

- name: Apply new WireGuard configuration without interface restart
  shell: "wg syncconf wg0 <(wg-quick strip /etc/wireguard/wg0.conf)"
  args:
    executable: /bin/bash
  when:
    - wg_conf.changed
    - wg0_link.rc == 0
  become: yes
