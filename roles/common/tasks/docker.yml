---
- name: Install Dependencies
  apt:
    name: [ca-certificates, curl, gnupg]
    state: present
    update_cache: no
    lock_timeout: 600
  register: docker_deps_install
  until: docker_deps_install is succeeded
  retries: 5
  delay: 10

- name: Create keyrings directory for Docker GPG
  file:
    path: /usr/share/keyrings
    state: directory
    mode: "0755"

- name: Check existing Docker keyring on target
  stat:
    path: /usr/share/keyrings/docker-archive-keyring.asc
  register: docker_keyring_stat

- name: Download Docker GPG key directly on target
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /usr/share/keyrings/docker-archive-keyring.asc
    mode: "0644"
    force: true
    timeout: 20
  register: docker_key_download_target
  retries: 2
  delay: 3
  until: docker_key_download_target is succeeded
  when:
    - not ansible_check_mode
    - not docker_keyring_stat.stat.exists
  ignore_errors: true

- name: Create local cache directory for Docker GPG key
  file:
    path: "{{ playbook_dir }}/.ansible/cache"
    state: directory
    mode: "0755"
  delegate_to: localhost
  run_once: true
  become: false
  when:
    - not ansible_check_mode
    - not docker_keyring_stat.stat.exists
    - docker_key_download_target.failed | default(false)

- name: Download Docker GPG key on control host
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: "{{ playbook_dir }}/.ansible/cache/docker.asc"
    mode: "0644"
    force: true
    timeout: 20
  delegate_to: localhost
  run_once: true
  become: false
  when:
    - not ansible_check_mode
    - not docker_keyring_stat.stat.exists
    - docker_key_download_target.failed | default(false)

- name: Copy cached Docker keyring to target
  copy:
    src: "{{ playbook_dir }}/.ansible/cache/docker.asc"
    dest: /usr/share/keyrings/docker-archive-keyring.asc
    mode: "0644"
  when:
    - not ansible_check_mode
    - not docker_keyring_stat.stat.exists
    - docker_key_download_target.failed | default(false)

- name: Remove old Docker apt source (avoid Signed-By conflict with legacy keyring)
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/docker.list
    - /etc/apt/sources.list.d/docker.list.d

- name: Find Docker apt source files with conflicting definitions
  find:
    paths: /etc/apt/sources.list.d
    patterns: "*docker*.list"
    file_type: file
  register: docker_source_files

- name: Remove conflicting Docker apt source files
  file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ docker_source_files.files }}"
  when: item.path != '/etc/apt/sources.list.d/docker.list'

- name: Remove Docker repo lines from main sources.list
  lineinfile:
    path: /etc/apt/sources.list
    regexp: '.*download\.docker\.com.*'
    state: absent

- name: Add Docker Repository (signed-by keyring)
  apt_repository:
    filename: docker
    repo: "deb [arch={{ ansible_facts['architecture'] | replace('x86_64','amd64') | replace('aarch64','arm64') }} signed-by=/usr/share/keyrings/docker-archive-keyring.asc] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
    state: present
    update_cache: no
  register: docker_repo_add
  until: docker_repo_add is succeeded
  retries: 5
  delay: 10

- name: Refresh APT cache after Docker repository update
  command: apt-get update
  register: docker_apt_update
  changed_when: false
  retries: 5
  delay: 10
  until: docker_apt_update.rc == 0

- name: Install Docker Engine & Compose Plugin
  apt:
    name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
    state: present
    update_cache: no
    lock_timeout: 600
  register: docker_engine_install
  until: docker_engine_install is succeeded
  retries: 5
  delay: 10

- name: Set Docker Log Limit (Prevent Disk Full)
  copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        }
      }
  register: docker_cfg

- name: Restart Docker
  systemd:
    name: docker
    state: restarted
  when: docker_cfg.changed

- name: Add User to Docker Group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes
