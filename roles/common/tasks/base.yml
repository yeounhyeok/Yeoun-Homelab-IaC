---
- name: Set Timezone to Asia/Seoul
  timezone:
    name: Asia/Seoul

- name: Enable IPv4 Forwarding (For WG/Docker Routing)
  sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    state: present
    reload: yes

- name: Configure APT network retries
  copy:
    dest: /etc/apt/apt.conf.d/99network-retry
    mode: '0644'
    content: |
      Acquire::Retries "5";
      Acquire::http::Timeout "20";
      Acquire::https::Timeout "20";
      Acquire::ForceIPv4 "true";

- name: Find Docker apt source files before apt operations
  find:
    paths: /etc/apt/sources.list.d
    patterns: "*docker*.list"
    file_type: file
  register: early_docker_source_files

- name: Remove conflicting Docker apt source files before apt operations
  file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ early_docker_source_files.files }}"
  when: item.path != '/etc/apt/sources.list.d/docker.list'

- name: Remove Docker repo lines from sources.list before apt operations
  lineinfile:
    path: /etc/apt/sources.list
    regexp: '.*download\.docker\.com.*'
    state: absent

- name: Refresh APT cache with retry
  command: apt-get update
  register: apt_update_result
  changed_when: false
  retries: 4
  delay: 5
  until: apt_update_result.rc == 0

- name: Install rsync (Required for file synchronization)
  apt:
    name: rsync
    state: present
    update_cache: no

# --- [분기점] AGH를 돌리는 서버(N4000)만 특별 관리 ---
- name: Disable systemd-resolved only on AGH host (N4000)
  service:
    name: systemd-resolved
    state: stopped
    enabled: no
  when:
    - inventory_hostname == 'n4000'
    - not (ts_accept_dns_by_host[inventory_hostname] | default(false))

- name: Setup static resolv.conf for AGH host
  copy:
    dest: /etc/resolv.conf
    content: |
      nameserver 127.0.0.1
      nameserver 8.8.8.8
    force: yes
  when:
    - inventory_hostname == 'n4000'
    - not (ts_accept_dns_by_host[inventory_hostname] | default(false))

# --- [분기점] AGH를 안 돌리는 나머지 서버들 설정 ---
- name: Fix systemd-resolved DNS for other hosts
  lineinfile:
    path: /etc/systemd/resolved.conf
    regexp: '^#?DNS='
    line: 'DNS=8.8.8.8 1.1.1.1 10.0.1.10'
  when:
    - inventory_hostname != 'n4000'
    - not (ts_accept_dns_by_host[inventory_hostname] | default(false))

- name: Ensure /etc/resolv.conf path is absent before linking (other hosts)
  file:
    path: /etc/resolv.conf
    state: absent
  when:
    - inventory_hostname != 'n4000'
    - not (ts_accept_dns_by_host[inventory_hostname] | default(false))

- name: Ensure Stub Resolver Link for other hosts
  file:
    src: /run/systemd/resolve/stub-resolv.conf
    dest: /etc/resolv.conf
    state: link
    force: yes
  when:
    - inventory_hostname != 'n4000'
    - not (ts_accept_dns_by_host[inventory_hostname] | default(false))

- name: Restart systemd-resolved for other hosts
  service:
    name: systemd-resolved
    state: restarted
    enabled: yes
  when:
    - inventory_hostname != 'n4000'
    - not (ts_accept_dns_by_host[inventory_hostname] | default(false))
