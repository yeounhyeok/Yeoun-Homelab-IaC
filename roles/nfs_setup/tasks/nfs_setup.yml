---
# ---------------------------------------------------------
# [COMMON] 패키지 관리
# ---------------------------------------------------------
- name: "[Common] Update apt cache"
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: "[Server] Install NFS Server package on n4000"
  apt:
    name: nfs-kernel-server
    state: present
  when: inventory_hostname == 'n4000'
- name: "[Client] Install NFS Common package on Worker Nodes"
  apt:
    name: nfs-common
    state: present
  when: inventory_hostname != 'n4000'

# ---------------------------------------------------------
# [PRE-CHECK & CLEANUP] 구시대의 유물 정리 (중요)
# ---------------------------------------------------------
#- name: "[Client] Unmount OLD problematic NFS paths"
#  mount:
#    path: "/home/yeoun/docker_volumes"  # 과거에 쓰던 꼬인 경로
#    state: absent                       # fstab에서도 지우고 마운트도 해제
#  when: inventory_hostname != 'n4000'
#
