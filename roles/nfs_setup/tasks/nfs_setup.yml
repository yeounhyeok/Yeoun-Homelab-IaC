#  file:
#    path: "/home/yeoun/docker_volumes"
#    state: absent
#  when: inventory_hostname == 'n4000'

# ---------------------------------------------------------
# [SERVER] NFS 서버 설정 (n4000)
# ---------------------------------------------------------
- name: "[Server] Ensure NFS server is started"
  service:
    name: nfs-kernel-server
    state: started
    enabled: yes
  when: inventory_hostname == 'n4000'

- name: "[n4000] Configure NFS exports"
  template:
    src: ../templates/exports.j2
    dest: /etc/exports
  register: nfs_exports_updated
  when: inventory_hostname == 'n4000'

- name: "[n4000] Apply NFS exports"
  command: exportfs -ra
  when: nfs_exports_updated.changed and inventory_hostname == 'n4000'

# ---------------------------------------------------------
# [CLIENT] 새로운 표준 경로로 마운트 (Worker Nodes)
# ---------------------------------------------------------
- name: "[Client] Collect currently mounted NFS paths"
  command: findmnt -rn -t nfs,nfs4 -o TARGET
  register: mounted_nfs_targets
  changed_when: false
  failed_when: false
  when: inventory_hostname != 'n4000'

- name: "[Client] Set mounted NFS path list"
  set_fact:
    mounted_nfs_paths: "{{ mounted_nfs_targets.stdout_lines | default([]) }}"
  when: inventory_hostname != 'n4000'

- name: "[Client] Unmount existing NFS mounts"
  shell: |
    if mountpoint -q "{{ item }}"; then
      umount "{{ item }}" || umount -l "{{ item }}"
    fi
  args:
    executable: /bin/bash
  loop: "{{ mounted_nfs_paths | default([]) }}"
  failed_when: false
  changed_when: true
  when:
    - inventory_hostname != 'n4000'
    - item != client_mount_path

- name: "[Client] Remove existing NFS entries from fstab"
  lineinfile:
    path: /etc/fstab
    regexp: '^[^#].*\s+nfs[0-9]*\s+.*$'
    state: absent
  when: inventory_hostname != 'n4000'

- name: "[Client] Ensure NEW mount point directory exists"
  file:
    path: "{{ client_mount_path }}"  # 표준 경로로 통일
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0775'
  when: inventory_hostname != 'n4000'

- name: "[Client] Mount NFS to NEW reliable path"
  mount:
    path: "{{ client_mount_path }}"
    src: "{{ nfs_server_ip }}:{{ real_data_path }}"
    fstype: nfs
    opts: "defaults,_netdev,nofail,soft,timeo=14,retrans=2"
    state: mounted
  when: inventory_hostname != 'n4000'
