---
- name: Validate Tailscale config for backup management path
  assert:
    that:
      - tailscale_tags is iterable
      - tailscale_tags is not string
      - tailscale_auth_key | length > 0
    fail_msg: "Set vault_tailscale_auth_key and optional tailscale_tags before applying tailscale role."
  when: tailscale_enabled | bool

- name: Validate OS support for tailscale apt repository
  assert:
    that:
      - ansible_facts["os_family"] == "Debian"
      - ansible_facts["distribution"] in ["Debian", "Ubuntu", "Raspbian"]
    fail_msg: "This tailscale role currently supports Debian/Ubuntu/Raspbian hosts only."
  when: tailscale_enabled | bool

- name: Install Tailscale package and repository dependencies
  block:
    - name: Stop background apt services temporarily (avoid dpkg lock contention)
      systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - apt-daily.service
        - apt-daily-upgrade.service
        - unattended-upgrades.service
      failed_when: false

    - name: Stop background apt timers temporarily (avoid immediate restart)
      systemd:
        name: "{{ item }}"
        state: stopped
      loop:
        - apt-daily.timer
        - apt-daily-upgrade.timer
      failed_when: false

    - name: Install apt prerequisites for Tailscale repository
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes
        lock_timeout: "{{ tailscale_apt_lock_timeout_seconds }}"
      register: tailscale_apt_prereq
      until: tailscale_apt_prereq is succeeded
      retries: "{{ tailscale_apt_retries }}"
      delay: "{{ tailscale_apt_retry_delay_seconds }}"

    - name: Ensure apt keyrings directory exists
      file:
        path: /usr/share/keyrings
        state: directory
        mode: "0755"

    - name: Add Tailscale apt repository keyring
      get_url:
        url: "https://pkgs.tailscale.com/stable/{{ 'ubuntu' if ansible_facts['distribution'] == 'Ubuntu' else 'debian' }}/{{ ansible_facts['distribution_release'] }}.noarmor.gpg"
        dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
        mode: "0644"

    - name: Add Tailscale apt repository list
      get_url:
        url: "https://pkgs.tailscale.com/stable/{{ 'ubuntu' if ansible_facts['distribution'] == 'Ubuntu' else 'debian' }}/{{ ansible_facts['distribution_release'] }}.tailscale-keyring.list"
        dest: /etc/apt/sources.list.d/tailscale.list
        mode: "0644"

    - name: Install Tailscale package
      apt:
        name: tailscale
        state: present
        update_cache: yes
        lock_timeout: "{{ tailscale_apt_lock_timeout_seconds }}"
      register: tailscale_pkg_install
      until: tailscale_pkg_install is succeeded
      retries: "{{ tailscale_apt_retries }}"
      delay: "{{ tailscale_apt_retry_delay_seconds }}"
  always:
    - name: Restore background apt timers after package install
      systemd:
        name: "{{ item }}"
        state: started
      loop:
        - apt-daily.timer
        - apt-daily-upgrade.timer
      failed_when: false
  become: yes
  when: tailscale_enabled | bool

- name: Configure and validate Tailscale backup path
  block:
    - name: Ensure tailscaled is enabled and running
      service:
        name: tailscaled
        state: started
        enabled: yes

    - name: Check current Tailscale status
      command: tailscale status --json
      register: tailscale_status
      changed_when: false
      failed_when: false

    - name: Bring node into tailnet (backup path only)
      command: >-
        tailscale up
        --authkey={{ tailscale_auth_key }}
        --hostname={{ tailscale_hostname }}
        --accept-dns={{ tailscale_accept_dns | ternary('true', 'false') }}
        {% if tailscale_tags | length > 0 %}--advertise-tags={{ tailscale_tags | join(',') }}{% endif %}
        {% if tailscale_login_server | length > 0 %}--login-server={{ tailscale_login_server }}{% endif %}
        {{ tailscale_extra_args | join(' ') }}
      no_log: true
      register: tailscale_up
      changed_when: tailscale_up.rc == 0
      when: tailscale_force_reauth | bool or tailscale_reapply_on_each_run | bool or tailscale_status.rc != 0

    - name: Minimal validation - tailscale binary is responsive
      command: tailscale version
      changed_when: false

    - name: Minimal validation - node has tailnet IPv4
      command: tailscale ip -4
      register: tailscale_ipv4
      changed_when: false
      failed_when: tailscale_ipv4.rc != 0
  become: yes
  when: tailscale_enabled | bool
