---
# host_specific 변수 로드 (group_vars/host_specific.yml → 각 호스트 fact). 태그 없음 → 항상 먼저 실행
- hosts: all
  gather_facts: false
  tasks:
    - name: Load encrypted shared variables
      include_vars:
        file: "{{ playbook_dir }}/group_vars/secrets.yml"
      no_log: true

    - name: Apply host-specific variables
      set_fact:
        "{{ item.key }}": "{{ item.value }}"
      loop: "{{ host_specific[inventory_hostname] | dict2items }}"
      when: host_specific is defined and inventory_hostname in host_specific
  tags: [always]

# do some common settings
- hosts: all
  become: yes
  roles:
    - common
  tags: common

- hosts: all
  become: yes
  roles:
    - ram_optimization
  tags: ram


# set tailscale 
- hosts: all
  become: yes
  roles:
    - tailscale
  tags: tailscale

# nfs setup
- hosts: all
  become: yes
  name: "NFS setting -> shares docker_volumes from n4000"
  roles:
    - nfs_setup
  tags: nfs


